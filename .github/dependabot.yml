# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "nuget" # See documentation for possible values
    directory: "src/FluxorBus.Abstractions" # Location of package manifests
    schedule:
      interval: "daily"
    open-pull-requests-limit: 20
  - package-ecosystem: "nuget" # See documentation for possible values
    directory: "src/FluxorBus.Core" # Location of package manifests
    schedule:
      interval: "daily"
    open-pull-requests-limit: 20
  - package-ecosystem: "nuget" # See documentation for possible values
    directory: "src/FluxorBus.Pipeline" # Location of package manifests
    schedule:
      interval: "daily"
    open-pull-requests-limit: 20
  - package-ecosystem: "nuget" # See documentation for possible values
    directory: "src/FluxorBus.SourceGen" # Location of package manifests
    schedule:
      interval: "daily"
    open-pull-requests-limit: 20
  - package-ecosystem: "nuget" # See documentation for possible values
    directory: "src/FluxorBus.DependencyInjection" # Location of package manifests
    schedule:
      interval: "daily"
    open-pull-requests-limit: 20
